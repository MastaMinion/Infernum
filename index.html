<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFERNUM — Abyssal Summons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<script>
/**
 * DemonCard — reusable card component for Infernum gacha game.
 *
 * Usage:
 *   const card = new DemonCard(demon, { width: 180 });
 *   document.body.appendChild(card.el);
 *
 * Public API:
 *   card.el              — the root DOM element
 *   card.demon           — the demon object (read-only reference)
 *   card.destroy()       — cleans up video + listeners (call before removing from DOM)
 */
(function (global) {
  'use strict';

  // Tier index → border filename slug (1-indexed array, position 0 unused)
  var TIER_SLUGS = [null, 'shade', 'imp', 'fiend', 'greater', 'archdemon', 'sinlord', 'void'];

  // Card art aspect ratio: height = width * (504/360)
  var ASPECT = 504 / 360;

  // Text scaling anchors: at 180px → name 9, tier 7; at 360px → name 13, tier 9.
  // Linear: name = 9 + (w - 180) * (13 - 9) / (360 - 180) = 9 + (w - 180) / 45
  //         tier = 7 + (w - 180) * (9 - 7)  / (360 - 180) = 7 + (w - 180) / 90
  function scaleName(w) { return 9 + (w - 180) / 45; }
  function scaleTier(w) { return 7 + (w - 180) / 90; }

  function DemonCard(demon, options) {
    if (!(this instanceof DemonCard)) return new DemonCard(demon, options);
    if (!demon) throw new Error('DemonCard: demon is required');

    options = options || {};

    this.demon = demon;
    this.opts = {
      width:     options.width     != null ? options.width     : 180,
      showName:  options.showName  !== false,
      showTier:  options.showTier  !== false,
      showCount: options.showCount !== false,
      animate:   options.animate   !== false,
      clickable: options.clickable === true,
      onClick:   typeof options.onClick === 'function' ? options.onClick : null
    };

    this._onClick = null; // bound handler, stored for cleanup
    this._onVideoError = null;
    this.el = this._build();
  }

  DemonCard.prototype._build = function () {
    var d = this.demon;
    var o = this.opts;
    var w = o.width;
    var h = Math.round(w * ASPECT);
    var color = d.color || '#ffffff';
    var slug = TIER_SLUGS[d.tier] || 'shade';

    // --- Root ---
    var root = document.createElement('div');
    root.className = 'demon-card';
    root.setAttribute('data-demon-id', d.id || '');
    root.setAttribute('data-tier', String(d.tier));
    applyStyles(root, {
      width: w + 'px',
      height: h + 'px',
      position: 'relative',
      borderRadius: '6px',
      overflow: 'hidden',
      cursor: o.clickable ? 'pointer' : 'default',
      // hint browser that this is a composited layer — helps video perf on grids
      transform: 'translateZ(0)'
    });

    // --- Art layer: video ---
    var video = document.createElement('video');
    video.src = 'assets/demons/' + d.id + '_card.mp4';
    video.muted = true;
    video.loop = true;
    video.playsInline = true;
    video.setAttribute('playsinline', '');       // iOS Safari
    video.setAttribute('webkit-playsinline', ''); // older iOS
    video.setAttribute('disablepictureinpicture', '');
    if (o.animate) {
      video.autoplay = true;
    }
    applyStyles(video, {
      width: '100%',
      height: '100%',
      objectFit: 'cover',
      display: 'block'
    });

    // Kick off playback (autoplay attribute isn't always enough on mobile)
    if (o.animate) {
      var playPromise = video.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(function () { /* swallow — autoplay blocked is OK */ });
      }
    } else {
      // If not animating, pause at first frame
      video.autoplay = false;
      video.pause();
    }

    // Fallback on video error: replace with colored rectangle + initial
    var self = this;
    this._onVideoError = function () {
      if (video.parentNode) {
        video.parentNode.replaceChild(self._buildFallback(w, h, color, d.name), video);
      }
    };
    video.addEventListener('error', this._onVideoError);
    this._video = video;
    root.appendChild(video);

    // --- Border overlay ---
    var border = document.createElement('img');
    border.src = 'assets/borders/infernum_border_' + slug + '.svg';
    border.alt = '';
    applyStyles(border, {
      position: 'absolute',
      top: '0', left: '0', right: '0', bottom: '0',
      width: '100%',
      height: '100%',
      pointerEvents: 'none'
    });
    // If border fails to load, just hide it silently — don't break the card
    border.addEventListener('error', function () { border.style.display = 'none'; });
    root.appendChild(border);

    // --- Count badge (top left) ---
    if (o.showCount && d.count && d.count > 1) {
      var badge = document.createElement('div');
      badge.className = 'card-count-badge';
      badge.textContent = '×' + d.count;
      applyStyles(badge, {
        position: 'absolute',
        top: '4px',
        left: '4px',
        background: 'rgba(6,0,14,.85)',
        border: '0.5px solid ' + color,
        borderRadius: '4px',
        padding: '2px 5px',
        fontFamily: 'sans-serif',
        fontSize: '8px',
        color: color,
        letterSpacing: '1px',
        lineHeight: '1',
        pointerEvents: 'none'
      });
      root.appendChild(badge);
    }

    // --- Bottom info bar ---
    if (o.showName || o.showTier) {
      var bar = document.createElement('div');
      applyStyles(bar, {
        position: 'absolute',
        bottom: '0',
        left: '0',
        right: '0',
        background: 'linear-gradient(to top, rgba(6,0,14,.9) 0%, transparent 100%)',
        padding: '12px 6px 5px',
        textAlign: 'center',
        pointerEvents: 'none'
      });

      if (o.showName && d.name) {
        var nameEl = document.createElement('div');
        nameEl.textContent = d.name;
        applyStyles(nameEl, {
          fontFamily: "'Cinzel', Georgia, serif",
          fontSize: scaleName(w).toFixed(2) + 'px',
          color: color,
          letterSpacing: '1px',
          whiteSpace: 'nowrap',
          overflow: 'hidden',
          textOverflow: 'ellipsis'
        });
        bar.appendChild(nameEl);
      }

      if (o.showTier && d.tierName) {
        var tierEl = document.createElement('div');
        tierEl.textContent = d.tierName;
        applyStyles(tierEl, {
          fontFamily: 'sans-serif',
          fontSize: scaleTier(w).toFixed(2) + 'px',
          color: color,
          opacity: '0.7',
          letterSpacing: '2px',
          textTransform: 'uppercase'
        });
        bar.appendChild(tierEl);
      }

      root.appendChild(bar);
    }

    // --- Click handling ---
    if (o.clickable && o.onClick) {
      this._onClick = function (e) { o.onClick(self.demon, e); };
      root.addEventListener('click', this._onClick);
    }

    return root;
  };

  // Build the fallback placeholder when the video fails to load.
  DemonCard.prototype._buildFallback = function (w, h, color, name) {
    var wrap = document.createElement('div');
    applyStyles(wrap, {
      width: '100%',
      height: '100%',
      position: 'relative',
      background: '#0a0410', // near-black so the 15% color tint reads
      display: 'block'
    });

    var tint = document.createElement('div');
    applyStyles(tint, {
      position: 'absolute',
      top: '0', left: '0', right: '0', bottom: '0',
      background: color,
      opacity: '0.15'
    });
    wrap.appendChild(tint);

    var initial = document.createElement('div');
    initial.textContent = (name && name.charAt(0).toUpperCase()) || '?';
    applyStyles(initial, {
      position: 'absolute',
      top: '0', left: '0', right: '0', bottom: '0',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      fontFamily: "'Cinzel', Georgia, serif",
      // scale initial to card size — roughly 40% of width looks right
      fontSize: Math.round(w * 0.4) + 'px',
      color: color,
      opacity: '0.6',
      lineHeight: '1',
      userSelect: 'none'
    });
    wrap.appendChild(initial);

    return wrap;
  };

  // Remove listeners and release the video element. Call before detaching from DOM.
  DemonCard.prototype.destroy = function () {
    if (this._onClick && this.el) {
      this.el.removeEventListener('click', this._onClick);
      this._onClick = null;
    }
    if (this._video) {
      if (this._onVideoError) {
        this._video.removeEventListener('error', this._onVideoError);
        this._onVideoError = null;
      }
      try {
        this._video.pause();
        this._video.removeAttribute('src');
        this._video.load(); // forces browser to release the file handle
      } catch (e) { /* ignore */ }
      this._video = null;
    }
    if (this.el && this.el.parentNode) {
      this.el.parentNode.removeChild(this.el);
    }
  };

  // --- tiny helper: apply a style object to an element ---
  function applyStyles(el, styles) {
    for (var k in styles) {
      if (Object.prototype.hasOwnProperty.call(styles, k)) {
        el.style[k] = styles[k];
      }
    }
  }

  // --- export ---
  global.DemonCard = DemonCard;

})(typeof window !== 'undefined' ? window : this);
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06000e;--bg2:#0d0020;--purple:#c084fc;--gold:#fbbf24;--crimson:#f43f5e;
  --text:#c8b8e8;--muted:#6a5a8a;--border:rgba(192,132,252,0.14);
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:Georgia,'Times New Roman',serif;
  min-height:100vh;overflow-x:hidden;position:relative;
}
/* ── BG SIGIL ── */
#bg-sigil{
  position:fixed;top:50%;left:50%;
  width:min(900px,160vw);height:min(900px,160vw);
  opacity:0.032;
  transform:translate(-50%,-50%);
  animation:sigilSpin 200s linear infinite;
  pointer-events:none;z-index:0;
}
#bg-sigil2{
  position:fixed;top:50%;left:50%;
  width:min(500px,90vw);height:min(500px,90vw);
  opacity:0.025;
  transform:translate(-50%,-50%);
  animation:sigilSpin 120s linear infinite reverse;
  pointer-events:none;z-index:0;
}
@keyframes sigilSpin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
/* ── FLASH ── */
#tier-flash{
  position:fixed;inset:0;z-index:300;pointer-events:none;
  opacity:0;transition:opacity 0.12s ease;
}
/* ── LAYOUT ── */
#app{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 16px 80px}
/* ── HEADER ── */
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:22px 0 18px;border-bottom:1px solid var(--border);
}
.logo{
  font-family:'Cinzel',serif;font-weight:900;
  font-size:clamp(1.5rem,5vw,2.2rem);letter-spacing:0.3em;
  color:var(--purple);
  text-shadow:0 0 24px rgba(192,132,252,0.45),0 0 60px rgba(192,132,252,0.15);
}
.logo-e{color:var(--crimson)}
.logo-sub{
  font-family:'Cinzel',serif;font-size:0.55rem;
  letter-spacing:0.35em;color:var(--muted);
  display:block;margin-top:2px;
}
#shard-display{
  display:flex;align-items:center;gap:10px;
  cursor:pointer;padding:9px 16px;
  border:1px solid var(--border);border-radius:24px;
  background:rgba(192,132,252,0.04);
  transition:all 0.2s;user-select:none;
  position:relative;
}
#shard-display:hover{border-color:rgba(192,132,252,0.4);background:rgba(192,132,252,0.09)}
#shard-display:active{transform:scale(0.97)}
.shard-gem{font-size:1.15rem;color:var(--purple);filter:drop-shadow(0 0 5px rgba(192,132,252,0.9))}
#shard-count{font-family:'Cinzel',serif;font-weight:700;font-size:1rem;color:var(--purple)}
.shard-add-label{font-size:0.6rem;color:var(--muted);font-style:italic;margin-top:1px}
.shard-pulse{animation:shardPop 0.3s ease}
@keyframes shardPop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
/* ── TABS ── */
.tabs{display:flex;gap:0;margin:22px 0 0;border-bottom:1px solid var(--border)}
.tab-btn{
  font-family:'Cinzel',serif;font-size:0.85rem;font-weight:700;
  letter-spacing:0.18em;padding:11px 30px;
  background:none;border:none;color:var(--muted);
  cursor:pointer;position:relative;transition:color 0.25s;
}
.tab-btn::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;
  height:2px;background:var(--purple);
  transform:scaleX(0);transition:transform 0.3s ease;
}
.tab-btn.active{color:var(--purple)}
.tab-btn.active::after{transform:scaleX(1)}
.tab-btn:hover:not(.active){color:var(--text)}
/* ── SCREENS ── */
#summon-screen,#codex-screen{display:none;padding-top:28px}
#summon-screen.active,#codex-screen.active{display:block}
/* ── FEATURED CARD ── */
.featured-section{display:flex;flex-direction:column;align-items:center;gap:0}
.featured-eyebrow{
  font-family:'Cinzel',serif;font-size:0.7rem;
  letter-spacing:0.35em;color:var(--gold);
  margin-bottom:14px;
  text-shadow:0 0 10px rgba(251,191,36,0.4);
}
.featured-card{
  width:min(260px,74vw);aspect-ratio:2/3;
  border-radius:14px;border:1.5px solid rgba(224,224,255,0.22);
  background:linear-gradient(165deg,#0d000f 0%,#1a0038 60%,#06000e 100%);
  position:relative;overflow:hidden;
  box-shadow:0 0 50px rgba(224,224,255,0.07),0 0 120px rgba(192,132,252,0.06),inset 0 0 40px rgba(224,224,255,0.04);
  display:flex;flex-direction:column;align-items:center;
  padding:18px 16px 16px;
}
.featured-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 55%,rgba(6,0,14,0.85) 100%);
  pointer-events:none;z-index:1;
}
.rate-up-badge{
  position:absolute;top:10px;right:10px;
  background:var(--gold);color:#1c0a00;
  font-family:'Cinzel',serif;font-size:0.6rem;font-weight:900;
  letter-spacing:0.15em;padding:3px 9px;border-radius:3px;z-index:3;
}
.featured-art{
  flex:1;width:88%;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.featured-art svg{width:100%;height:100%;max-height:190px}
.featured-info{
  text-align:center;z-index:2;width:100%;
  padding-top:8px;
}
.featured-tier-label{
  font-family:'Cinzel',serif;font-size:0.6rem;
  letter-spacing:0.25em;color:#e0e0ff;
  text-transform:uppercase;margin-bottom:4px;
  text-shadow:0 0 10px rgba(224,224,255,0.7);
}
.featured-name{
  font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700;
  color:#e0e0ff;text-shadow:0 0 14px rgba(224,224,255,0.55);
  font-style:italic;
}
/* ── COUNTDOWN ── */
.countdown-wrap{margin:18px 0 4px;text-align:center}
.countdown-label{font-size:0.68rem;color:var(--muted);letter-spacing:0.12em;margin-bottom:5px}
#countdown{
  font-family:'Cinzel',serif;font-size:1.25rem;font-weight:700;
  color:var(--gold);letter-spacing:0.12em;
  text-shadow:0 0 12px rgba(251,191,36,0.45);
}
/* ── SECTION DIV ── */
.section-div{
  text-align:center;margin:24px 0 16px;position:relative;
}
.section-div::before{
  content:'';position:absolute;top:50%;left:0;right:0;
  height:1px;background:var(--border);
}
.section-div span{
  position:relative;background:var(--bg);
  padding:0 14px;font-family:'Cinzel',serif;
  font-size:0.65rem;color:var(--muted);letter-spacing:0.25em;
}
/* ── PITY ── */
.pity-section{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:11px}
.pity-bar{
  background:rgba(255,255,255,0.025);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;
}
.pity-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.pity-name{font-size:0.72rem;color:var(--muted);letter-spacing:0.05em}
.pity-count{font-family:'Cinzel',serif;font-size:0.8rem}
.pity-track{height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden}
.pity-fill{height:100%;border-radius:3px;transition:width 0.5s cubic-bezier(.4,0,.2,1)}
.pity-bar.epic .pity-count{color:var(--purple)}
.pity-bar.epic .pity-fill{background:linear-gradient(90deg,#7c3aed,var(--purple))}
.pity-bar.legendary .pity-count{color:var(--crimson)}
.pity-bar.legendary .pity-fill{background:linear-gradient(90deg,#9f1239,var(--crimson))}
/* ── PULL BUTTONS ── */
.pull-buttons{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:24px 0 8px}
.pull-btn{
  font-family:'Cinzel',serif;font-size:0.85rem;font-weight:700;
  letter-spacing:0.12em;padding:14px 28px;
  border-radius:7px;cursor:pointer;
  position:relative;overflow:hidden;
  transition:transform 0.15s,box-shadow 0.15s;
  min-width:165px;text-align:center;
}
.pull-btn:active:not(:disabled){transform:scale(0.97)}
.pull-btn-1{
  background:linear-gradient(135deg,#18003a,#2c0060);
  color:var(--purple);border:1px solid rgba(192,132,252,0.35);
  box-shadow:0 0 20px rgba(192,132,252,0.08);
}
.pull-btn-1:hover:not(:disabled){
  background:linear-gradient(135deg,#25005a,#420090);
  box-shadow:0 0 28px rgba(192,132,252,0.18);
  border-color:rgba(192,132,252,0.6);
}
.pull-btn-10{
  background:linear-gradient(135deg,#1c0a00,#3c1800);
  color:var(--gold);border:1px solid rgba(251,191,36,0.3);
  box-shadow:0 0 20px rgba(251,191,36,0.06);
}
.pull-btn-10:hover:not(:disabled){
  background:linear-gradient(135deg,#2e1200,#5a2800);
  box-shadow:0 0 28px rgba(251,191,36,0.15);
  border-color:rgba(251,191,36,0.55);
}
.pull-btn:disabled{opacity:0.28;cursor:not-allowed}
.btn-label{display:block}
.btn-cost{display:block;font-size:0.68rem;font-weight:400;opacity:0.65;margin-top:2px}
/* ── PULL OVERLAY ── */
#pull-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(6,0,14,0.97);z-index:200;
  flex-direction:column;align-items:center;
  justify-content:center;padding:20px 16px;
  overflow-y:auto;
}
#pull-overlay.active{display:flex}
.pull-container{
  display:flex;flex-direction:column;align-items:center;
  gap:14px;width:100%;
}
.pull-row{display:flex;gap:8px;justify-content:center;flex-wrap:nowrap}
/* ── FLIP CARD ── */
.fc-wrap{perspective:1000px}
.fc{
  position:relative;transform-style:preserve-3d;
  transition:transform 0.7s cubic-bezier(0.4,0,0.2,1);
  width:100%;height:100%;
  border-radius:9px;
}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:9px;overflow:hidden;
}
.fc-back{
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(155deg,#0d0020,#1a0038);
  border:1px solid rgba(192,132,252,0.18);
}
.fc-back svg{width:100%;height:100%}
.fc-front{
  transform:rotateY(180deg);
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-between;padding:8px 6px;
}
.fc-art{flex:1;width:80%;display:flex;align-items:center;justify-content:center;overflow:hidden}
.fc-art svg{width:100%;height:100%}
.fc-info{text-align:center;width:100%;padding:4px 2px 0}
.fc-tier-name{
  font-family:'Cinzel',serif;font-size:0.52rem;
  letter-spacing:0.18em;text-transform:uppercase;
  margin-bottom:3px;
}
.fc-name{font-style:italic;font-size:0.58rem;color:#d4c8e8;line-height:1.3}
/* Single pull */
.pull-single .fc-wrap{width:min(210px,62vw);aspect-ratio:2/3}
/* Multi pull */
.pull-multi .fc-wrap{
  width:min(108px,calc((100vw - 56px) / 5.2));
  aspect-ratio:2/3;
}
/* ── POST-PULL ── */
.post-pull{display:none;gap:12px;margin-top:22px;flex-wrap:wrap;justify-content:center}
.ppbtn{
  font-family:'Cinzel',serif;font-size:0.8rem;font-weight:700;
  letter-spacing:0.12em;padding:11px 24px;
  border-radius:6px;border:1px solid;cursor:pointer;
  transition:all 0.2s;
}
.ppbtn-p{border-color:var(--purple);background:rgba(192,132,252,0.1);color:var(--purple)}
.ppbtn-p:hover{background:rgba(192,132,252,0.2)}
.ppbtn-s{border-color:var(--muted);background:rgba(255,255,255,0.02);color:var(--muted)}
.ppbtn-s:hover{border-color:var(--text);color:var(--text)}
/* ── CODEX ── */
.codex-hd{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.codex-title{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700;letter-spacing:0.22em;color:var(--purple)}
#codex-count{font-size:0.8rem;color:var(--muted)}
.codex-grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:10px;
}
@media(max-width:600px){.codex-grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}}
@media(max-width:360px){.codex-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
.codex-card{
  aspect-ratio:2/3;border-radius:9px;border:1px solid;
  overflow:hidden;position:relative;
  display:flex;flex-direction:column;

function svg(tierId){return SVGS[tierId]||SVGS.shade}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let S={
  shards:1200,epicPity:0,legPity:0,
  collection:{},bannerExpiry:null,
};
let lastCount=1;

function save(){localStorage.setItem('inf_s',JSON.stringify(S))}
function load(){
  try{
    const d=localStorage.getItem('inf_s');
    if(d) S=Object.assign(S,JSON.parse(d));
  }catch(e){}
  if(!S.bannerExpiry){
    S.bannerExpiry=Date.now()+((2*24+14)*3600+33*60)*1000;
    save();
  }
}

/* ═══════════════════════════════════════════
   GACHA LOGIC
═══════════════════════════════════════════ */
function rollTier(){
  const r=Math.random();let c=0;
  for(let i=0;i<PROBS.length;i++){c+=PROBS[i];if(r<=c)return i}
  return 0;
}
function pullOne(){
  S.epicPity++;S.legPity++;
  let ti=rollTier();
  if(S.epicPity>=40&&ti<3) ti=3;
  if(S.legPity>=70&&ti<4) ti=4;
  if(ti>=3) S.epicPity=0;
  if(ti>=4) S.legPity=0;
  const tier=TIERS[ti];
  const pool=POOL[tier.id];
  const name=pool[Math.floor(Math.random()*pool.length)];
  S.collection[name]=(S.collection[name]||0)+1;
  return{tier,name,ti};
}
function doPull(count){
  const cost=count===1?100:900;
  if(S.shards<cost) return;
  lastCount=count;
  S.shards-=cost;
  const results=[];
  for(let i=0;i<count;i++) results.push(pullOne());
  save();updateUI();
  showOverlay(results);
}

/* ═══════════════════════════════════════════
   PULL OVERLAY
═══════════════════════════════════════════ */
function showOverlay(results){
  const ov=document.getElementById('pull-overlay');
  const area=document.getElementById('pull-container');
  const pp=document.getElementById('post-pull');
  const isSingle=results.length===1;
  ov.style.display='flex';
  pp.style.display='none';

  // Clean up any previous videos
  if(area._videos) area._videos.forEach(v=>{try{v.pause();v.removeAttribute('src');v.load();}catch(e){}});
  area._videos=[];
  area.innerHTML='';

  const cont=document.createElement('div');
  cont.className=`pull-container ${isSingle?'pull-single':'pull-multi'}`;

  if(isSingle){
    cont.appendChild(buildCardEl(results[0],0,true,area._videos));
  } else {
    const r1=document.createElement('div');r1.className='pull-row';
    const r2=document.createElement('div');r2.className='pull-row';
    for(let i=0;i<5;i++) r1.appendChild(buildCardEl(results[i],i,false,area._videos));
    for(let i=5;i<10;i++) r2.appendChild(buildCardEl(results[i],i,false,area._videos));
    cont.appendChild(r1);cont.appendChild(r2);
  }
  area.appendChild(cont);

  results.forEach((r,i)=>{
    const delay=isSingle?380:380+i*150;
    setTimeout(()=>flip(i,r),delay);
  });
  const total=isSingle?1300:380+(results.length-1)*150+1100;
  setTimeout(()=>{pp.style.display='flex'},total);
}

function buildCardEl(r,i,isSingle,videoPool){
  const t=r.tier;
  const demonId=DEMON_IDS[r.name]||r.name.toLowerCase().replace(/['\s]/g,'_').replace(/[^a-z0-9_]/g,'');
  const borderSlug=TIER_BORDER_SLUGS[t.idx]||'shade';

  const fcWrap=document.createElement('div');
  fcWrap.className='fc-wrap';

  const fc=document.createElement('div');
  fc.className='fc';fc.id='fc'+i;

  // Back face — real card back image
  const back=document.createElement('div');
  back.className='fc-face fc-back';
  const backImg=document.createElement('img');
  backImg.src='assets/ui/card_back.png';
  backImg.alt='';
  backImg.style.cssText='width:100%;height:100%;object-fit:cover;display:block;border-radius:9px;';
  // Fallback to SVG if image missing
  backImg.addEventListener('error',()=>{back.innerHTML=CARD_BACK;});
  back.appendChild(backImg);

  // Front face — video + border + info
  const front=document.createElement('div');
  front.className='fc-face fc-front';
  front.style.cssText='transform:rotateY(180deg);padding:0;background:'+t.bg+';';

  // Video layer
  const video=document.createElement('video');
  video.src='assets/demons/'+demonId+'_card.mp4';
  video.autoplay=true;video.loop=true;video.muted=true;video.playsInline=true;
  video.setAttribute('playsinline','');video.setAttribute('webkit-playsinline','');
  video.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;';
  video.play().catch(()=>{});
  // Fallback: tinted bg if video missing
  video.addEventListener('error',()=>{
    front.style.background=`linear-gradient(158deg,${t.bg},#06000e)`;
    front.innerHTML=''; // clear, keep info
    front.appendChild(infoBar);
  });
  if(videoPool) videoPool.push(video);

  // Border overlay
  const border=document.createElement('img');
  border.src='assets/borders/infernum_border_'+borderSlug+'.svg';
  border.alt='';
  border.style.cssText='position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;';
  border.addEventListener('error',()=>{border.style.display='none';});

  // Info bar
  const infoBar=document.createElement('div');
  infoBar.style.cssText='position:absolute;bottom:0;left:0;right:0;z-index:3;background:linear-gradient(to top,rgba(6,0,14,.9) 40%,transparent);padding:18px 6px 6px;text-align:center;pointer-events:none;';
  infoBar.innerHTML=`<div style="font-family:'Cinzel',serif;font-size:0.52rem;letter-spacing:0.18em;color:${t.color};text-shadow:0 0 8px ${t.color}60;margin-bottom:3px;text-transform:uppercase;">${t.label.toUpperCase()}</div><div style="font-style:italic;font-size:0.58rem;color:#d4c8e8;line-height:1.3;">${r.name}</div>`;

  front.appendChild(video);
  front.appendChild(border);
  front.appendChild(infoBar);

  fc.appendChild(back);fc.appendChild(front);
  fcWrap.appendChild(fc);
  return fcWrap;
}

function flip(i,r){
  const card=document.getElementById('fc'+i);
  if(!card) return;
  card.classList.add('flipped');
  if(r.ti>=4){
    setTimeout(()=>flash(r.tier.color),420);
  }
}

function flash(col){
  const el=document.getElementById('tier-flash');
  el.style.background=col;
  el.style.transition='opacity 0.12s ease';
  el.style.opacity='0.32';
  setTimeout(()=>{
    el.style.transition='opacity 1.8s ease';
    el.style.opacity='0';
  },180);
}

function closeOverlay(){
  const ov=document.getElementById('pull-overlay');
  const area=document.getElementById('pull-container');
  ov.style.display='none';
  // Release video resources
  if(area._videos){
    area._videos.forEach(v=>{try{v.pause();v.removeAttribute('src');v.load();}catch(e){}});
    area._videos=[];
  }
}

/* ═══════════════════════════════════════════
   UI
═══════════════════════════════════════════ */
function updateUI(){
  document.getElementById('shard-count').textContent=S.shards.toLocaleString();
  document.getElementById('btn-pull-1').disabled=S.shards<100;
  document.getElementById('btn-pull-10').disabled=S.shards<900;
  document.getElementById('epic-count').textContent=`${S.epicPity} / 40`;
  document.getElementById('leg-count').textContent=`${S.legPity} / 70`;
  document.getElementById('epic-fill').style.width=`${Math.min(100,(S.epicPity/40)*100)}%`;
  document.getElementById('leg-fill').style.width=`${Math.min(100,(S.legPity/70)*100)}%`;
}

function addDemoShards(){
  S.shards+=500;save();updateUI();
  const d=document.getElementById('shard-display');
  d.classList.add('shard-pulse');
  setTimeout(()=>d.classList.remove('shard-pulse'),400);
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.getElementById('summon-screen').classList.toggle('active',tab==='summon');
  document.getElementById('codex-screen').classList.toggle('active',tab==='codex');
  if(tab==='codex') renderCodex();
}

/* ═══════════════════════════════════════════
   CODEX
═══════════════════════════════════════════ */
function renderCodex(){
  const grid=document.getElementById('codex-grid');
  const owned=ALL_DEMONS.filter(d=>(S.collection[d.name]||0)>0).length;
  document.getElementById('codex-count').textContent=`${owned} / ${ALL_DEMONS.length} demons bound`;

  // Destroy old DemonCards
  if(grid._cards) grid._cards.forEach(c=>c.destroy());
  grid._cards=[];
  grid.innerHTML='';

  for(const d of ALL_DEMONS){
    const cnt=S.collection[d.name]||0;
    const t=d.tier;

    if(cnt>0){
      // Use DemonCard component for owned demons
      const demonObj={
        id: DEMON_IDS[d.name]||d.name.toLowerCase().replace(/['\s]/g,'_').replace(/[^a-z0-9_]/g,''),
        name: d.name,
        tier: t.idx+1,
        tierName: t.name,
        color: t.color,
        count: cnt
      };
      const card=new DemonCard(demonObj,{
        width:120, // DemonCard handles sizing; CSS grid stretches it
        showName:true,
        showTier:true,
        showCount:true,
        animate:true,
      });
      // Override DemonCard's fixed width so it fills the grid cell
      card.el.style.width='100%';
      card.el.style.height='100%';
      card.el.style.position='absolute';
      card.el.style.inset='0';
      card.el.style.borderRadius='9px';

      // Wrapper cell (maintains aspect ratio via existing .codex-card CSS)
      const cell=document.createElement('div');
      cell.className='codex-card';
      cell.style.cssText=`border-color:${t.color}35;background:${t.bg};position:relative;padding:0;`;
      cell.appendChild(card.el);
      grid.appendChild(cell);
      grid._cards.push(card);
    } else {
      // Unknown demon — keep SVG placeholder
      const cell=document.createElement('div');
      cell.className='codex-card cc-unknown';
      cell.innerHTML=`<div class="cc-art">${svg(t.id)}</div><div><div class="cc-name">???</div><div class="cc-tier" style="color:#2a1a4a">???</div></div>`;
      grid.appendChild(cell);
    }
  }
}

/* ═══════════════════════════════════════════
   COUNTDOWN
═══════════════════════════════════════════ */
function tick(){
  const rem=Math.max(0,S.bannerExpiry-Date.now());
  if(rem<=0){document.getElementById('countdown').textContent='BANNER ENDED';return}
  const d=Math.floor(rem/86400000);
  const h=Math.floor((rem%86400000)/3600000);
  const m=Math.floor((rem%3600000)/60000);
  const s=Math.floor((rem%60000)/1000);
  document.getElementById('countdown').textContent=
    (d>0?d+'d ':'')+h+'h '+m+'m '+s+'s';
}

/* ═══════════════════════════════════════════
   WIRE-UP
═══════════════════════════════════════════ */
document.getElementById('btn-again').onclick=()=>{
  closeOverlay();
  const cost=lastCount===1?100:900;
  if(S.shards>=cost) setTimeout(()=>doPull(lastCount),80);
};
document.getElementById('btn-codex-nav').onclick=()=>{
  closeOverlay();switchTab('codex');
};

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
(function init(){
  load();
  // Featured card — show Void Primordial video art
  const featArt=document.getElementById('featured-art');
  const featVideo=document.createElement('video');
  featVideo.src='assets/demons/the_unnamed_one_card.mp4';
  featVideo.autoplay=true;featVideo.loop=true;featVideo.muted=true;featVideo.playsInline=true;
  featVideo.setAttribute('playsinline','');
  featVideo.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:10px;display:block;';
  featVideo.play().catch(()=>{});
  // Fallback to SVG if video missing
  featVideo.addEventListener('error',()=>{
    featArt.innerHTML=SVGS.void_primordial;
  });
  featArt.innerHTML='';
  featArt.style.cssText='flex:1;width:88%;overflow:hidden;border-radius:10px;';
  featArt.appendChild(featVideo);
  updateUI();
  renderCodex();
  tick();setInterval(tick,1000);
})();
